services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - internal
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /root/.acme.sh/yywtaylor.cyou_ecc:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - internal

networks:
  internal:
    driver: bridge

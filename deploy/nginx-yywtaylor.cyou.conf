# 部署路径：/etc/nginx/sites-available/yywtaylor.cyou
# 启用：sudo ln -s /etc/nginx/sites-available/yywtaylor.cyou /etc/nginx/sites-enabled/
# 重载：sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name yywtaylor.cyou www.yywtaylor.cyou;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yywtaylor.cyou www.yywtaylor.cyou;

    ssl_certificate     /root/.acme.sh/yywtaylor.cyou_ecc/fullchain.cer;
    ssl_certificate_key /root/.acme.sh/yywtaylor.cyou_ecc/yywtaylor.cyou.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
